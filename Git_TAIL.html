<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comando TAIL</title>
    <style>
        body {
            background-color: #2b2b2b;
            font-family: Arial;
            text-align: center;
            color: white;
        }

        .ejemplo {
            background-color: white;
            color: black;
            font-weight: bold;
            width: 60%;
            margin: 15px auto;
            padding: 10px;
        }

        hr {
            border: 3px solid white;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Comando TAIL</h1>
    <p>Este comando muestra las últimas líneas de un archivo.</p>
    <hr>

    <h2>-n</h2>
    <p>Permite indicar el número de líneas a mostrar.</p>
    <div class="ejemplo">tail -n 5 archivo.txt</div>
    <hr>

    <h2>-f</h2>
    <p>Muestra el contenido en tiempo real (útil para logs).</p>
    <div class="ejemplo">tail -f archivo.log</div>
    <hr>

    <br><br>

</body>
</html>
